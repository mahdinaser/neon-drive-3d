(function(){const pmrem=new THREE.PMREMGenerator(renderer);

function roadTex(emis){const c=document.createElement('canvas');c.width=256;c.height=1024;const x=c.getContext('2d');
 if(emis){x.fillStyle='#000';x.fillRect(0,0,256,1024);} else {x.fillStyle='#0c0e15';x.fillRect(0,0,256,1024);
   const g=x.createLinearGradient(0,0,256,0);g.addColorStop(0,'#0e1018');g.addColorStop(.5,'#14161f');g.addColorStop(1,'#0e1018');x.fillStyle=g;x.fillRect(0,0,256,1024);}
 x.fillStyle=emis?'#fff':'#e6ecff'; x.fillRect(6,0,5,1024); x.fillRect(245,0,5,1024);            // edges
 x.fillStyle=emis?'#fff2a0':'#f2e23a'; for(let y=0;y<1024;y+=120)x.fillRect(125,y,6,72);          // center dashes
 x.fillStyle=emis?'#cfe0ff':'#cdd0e0'; for(let y=40;y<1024;y+=120){x.fillRect(84,y,4,58);x.fillRect(168,y,4,58);}
 const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(1,34);t.anisotropy=8;return t;}
const rtex=roadTex(false), retex=roadTex(true);
const road=new THREE.Mesh(new THREE.PlaneGeometry(18,1600),
  new THREE.MeshStandardMaterial({map:rtex,emissive:0xffffff,emissiveMap:retex,emissiveIntensity:0.55,roughness:0.28,metalness:0.1}));
road.rotation.x=-Math.PI/2; road.position.z=-740; road.receiveShadow=true; scene.add(road);
const ground=new THREE.Mesh(new THREE.PlaneGeometry(4000,4000),new THREE.MeshStandardMaterial({color:0x070912,roughness:1}));
ground.rotation.x=-Math.PI/2; ground.position.y=-0.05; ground.receiveShadow=true; scene.add(ground);

// ---- glowing guard rails + reflector posts ----
const neon=[0xff3b6e,0x3bd1ff,0xb45bff,0xffd23b,0x3bff8e];
function rail(side){const m=new THREE.Mesh(new THREE.BoxGeometry(0.25,0.5,1600),
  new THREE.MeshStandardMaterial({color:0x10131f,emissive:side>0?0x3bd1ff:0xff3b6e,emissiveIntensity:1.4,roughness:0.4}));
  m.position.set(side*9.6,0.5,-740);scene.add(m);}
rail(-1);rail(1);
const posts=[];const SPAN=680;
for(let i=0;i<40;i++){const side=i%2?1:-1;
  const p=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.7,0.3),new THREE.MeshStandardMaterial({color:0x111,emissive:0xffc04d,emissiveIntensity:1.6}));
  p.position.set(side*9.0,0.7,-Math.random()*SPAN);posts.push(p);scene.add(p);}

// ---- car factory (sleek, reflective, glowing lights) ----
function makeCar(color, hero){const g=new THREE.Group();
 const paint=new THREE.MeshStandardMaterial({color,metalness:0.95,roughness:0.22});
 const glass=new THREE.MeshStandardMaterial({color:0x0a0e18,metalness:0.6,roughness:0.05,emissive:0x0a1830,emissiveIntensity:0.4});
 const body=new THREE.Mesh(new THREE.BoxGeometry(1.92,0.42,4.3),paint);body.position.y=0.62;body.castShadow=true;g.add(body);
 const lower=new THREE.Mesh(new THREE.BoxGeometry(2.0,0.34,4.2),new THREE.MeshStandardMaterial({color:0x0a0a0e,metalness:0.5,roughness:0.5}));lower.position.y=0.36;g.add(lower);
 const nose=new THREE.Mesh(new THREE.BoxGeometry(1.78,0.3,1.2),paint);nose.position.set(0,0.78,-1.7);nose.castShadow=true;g.add(nose);
 const cabin=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.46,1.7),glass);cabin.position.set(0,1.0,0.25);g.add(cabin);
 const spoiler=new THREE.Mesh(new THREE.BoxGeometry(1.9,0.1,0.5),paint);spoiler.position.set(0,1.0,2.0);g.add(spoiler);
 const sp1=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.34,0.12),paint);sp1.position.set(-0.8,0.85,2.05);g.add(sp1);
 const sp2=sp1.clone();sp2.position.x=0.8;g.add(sp2);
 const wg=new THREE.CylinderGeometry(0.46,0.46,0.42,20),wm=new THREE.MeshStandardMaterial({color:0x09090b,roughness:0.85});
 const rimM=new THREE.MeshStandardMaterial({color:0x222,metalness:0.9,roughness:0.25});
 [[-1.02,-1.45],[1.02,-1.45],[-1.02,1.45],[1.02,1.45]].forEach(([x,z])=>{const w=new THREE.Mesh(wg,wm);w.rotation.z=Math.PI/2;w.position.set(x,0.46,z);w.castShadow=true;g.add(w);
   const r=new THREE.Mesh(new THREE.CylinderGeometry(0.24,0.24,0.44,12),rimM);r.rotation.z=Math.PI/2;r.position.set(x,0.46,z);g.add(r);});
 const tl=new THREE.Mesh(new THREE.BoxGeometry(1.74,0.16,0.08),new THREE.MeshStandardMaterial({color:0x330000,emissive:0xff1418,emissiveIntensity:3}));tl.position.set(0,0.7,2.18);g.add(tl);
 if(hero){
   const hb=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.14,0.08),new THREE.MeshStandardMaterial({color:0xfff,emissive:0xdfeaff,emissiveIntensity:3}));hb.position.set(0,0.74,-2.18);g.add(hb);
   const under=new THREE.Mesh(new THREE.BoxGeometry(2.0,0.05,4.2),new THREE.MeshStandardMaterial({color:0x000,emissive:0x16e0ff,emissiveIntensity:2.2}));under.position.y=0.16;g.add(under);
   const ug=new THREE.PointLight(0x16e0ff,1.6,9); ug.position.set(0,0.1,0); g.add(ug);
 }
 return g;}
const player=makeCar(0xd11f2f,true); player.position.set(0,0,4); scene.add(player);
const tgt=new THREE.Object3D();tgt.position.set(0,0,-36);player.add(tgt);
function head(x){const s=new THREE.SpotLight(0xfff1de,2.4,95,Math.PI/7.5,0.5,1.2);s.position.set(x,0.9,-1.9);s.target=tgt;player.add(s);}
head(-0.7);head(0.7);

// ---- neon city (denser) + billboards ----
function winTex(){const c=document.createElement('canvas');c.width=64;c.height=128;const x=c.getContext('2d');x.fillStyle='#04050a';x.fillRect(0,0,64,128);
 for(let yy=5;yy<128;yy+=11)for(let xx=5;xx<64;xx+=11)if(Math.random()<0.55){x.fillStyle=Math.random()<0.5?'#ffe9a8':'#9fe8ff';x.fillRect(xx,yy,7,7);}
 const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;}
const wts=[winTex(),winTex(),winTex(),winTex()]; const buildings=[];
for(let i=0;i<64;i++){const side=i%2?1:-1,w=4+Math.random()*6,h=14+Math.random()*60,d=4+Math.random()*6;
 const wt=wts[i%4].clone();wt.needsUpdate=true;wt.repeat.set(Math.max(1,Math.round(w/3)),Math.max(2,Math.round(h/4)));
 const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color:0x0a0c18,emissive:neon[i%5],emissiveIntensity:0.4,emissiveMap:wt,roughness:0.8,metalness:0.2}));
 b.position.set(side*(12+Math.random()*22),h/2,-Math.random()*SPAN); buildings.push(b); scene.add(b);}
const billboards=[];
for(let i=0;i<8;i++){const side=i%2?1:-1;
 const bb=new THREE.Mesh(new THREE.PlaneGeometry(6,3),new THREE.MeshStandardMaterial({color:0x000,emissive:neon[i%5],emissiveIntensity:2.2,side:THREE.DoubleSide}));
 bb.position.set(side*13,7+Math.random()*8,-80-i*80); bb.rotation.y=side>0?-0.5:0.5; billboards.push(bb); scene.add(bb);}
const plights=[];for(let i=0;i<7;i++){const p=new THREE.PointLight(neon[i%5],1.4,52);p.position.set((i%2?1:-1)*13,7,-i*92);scene.add(p);plights.push(p);}

// ---- traffic ----
const traffic=[];const tc=[0x2a6cff,0xffd21e,0x2fce6a,0xdfe2ea,0xff5bd0];
for(let i=0;i<11;i++){const c=makeCar(tc[i%5],false);c.position.set((Math.random()*2-1)*5.5,0,-55-i*60);c.userData.speed=16+Math.random()*12;traffic.push(c);scene.add(c);}

// ---- audio ----
let actx,eng,eg;
function aInit(){if(actx)return;try{actx=new(window.AudioContext||window.webkitAudioContext)();eng=actx.createOscillator();eg=actx.createGain();eng.type='sawtooth';eng.frequency.value=55;eg.gain.value=0;eng.connect(eg);eg.connect(actx.destination);eng.start();}catch(e){}}
function sfx(t){if(!actx)return;const n=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);let f0=170,f1=40,d=.3,w='sawtooth',v=.25;if(t=='boost'){f0=300;f1=1300;d=.4;w='triangle';v=.16;}o.type=w;o.frequency.setValueAtTime(f0,n);o.frequency.exponentialRampToValueAtTime(f1,n+d);g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(.001,n+d);o.start(n);o.stop(n+d+.02);}

// ---- state ----
let speed=0,maxSpeed=120,nitro=100,boosting=false,px=0,steer=0,dist=0,timeMs=0,shake=0,keys={};
addEventListener('keydown',e=>{aInit();keys[e.code]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','ShiftLeft','ShiftRight'].includes(e.code))e.preventDefault();});
addEventListener('keyup',e=>{keys[e.code]=false;});
const lerp=(a,b,t)=>a+(b-a)*t;
function update(dt){ timeMs+=dt*1000;
 const sp=speed/maxSpeed;
 boosting=(keys.ShiftLeft||keys.ShiftRight)&&nitro>0&&speed>maxSpeed*0.25;
 const cmax=boosting?maxSpeed*1.5:maxSpeed; nitro=boosting?Math.max(0,nitro-dt*28):Math.min(100,nitro+dt*9);
 if(keys.ArrowUp||keys.KeyW)speed+=46*dt; else if(keys.ArrowDown||keys.KeyS)speed-=120*dt; else speed-=22*dt;
 if(boosting)speed+=42*dt; speed=Math.max(0,Math.min(speed,cmax));
 steer=(keys.ArrowLeft||keys.KeyA?-1:0)+(keys.ArrowRight||keys.KeyD?1:0);
 px+=steer*dt*9*(0.45+sp*0.7); const off=Math.abs(px)>7.6; if(off&&speed>maxSpeed*0.25)speed-=70*dt;
 px=Math.max(-9,Math.min(9,px));
 player.position.x=lerp(player.position.x,px,0.18); player.rotation.y=lerp(player.rotation.y,-steer*0.12,0.2); player.rotation.z=lerp(player.rotation.z,-steer*0.06,0.2);
 player.position.y=Math.sin(timeMs*0.02)*sp*0.04;
 rtex.offset.y-=speed*dt*0.018; retex.offset.y=rtex.offset.y;
 for(const b of buildings){b.position.z+=speed*dt; if(b.position.z>24){b.position.z-=SPAN; b.position.x=(b.position.x>0?1:-1)*(12+Math.random()*22);}}
 for(const p of posts){p.position.z+=speed*dt; if(p.position.z>24)p.position.z-=SPAN;}
 for(const p of plights){p.position.z+=speed*dt; if(p.position.z>24)p.position.z-=SPAN;}
 for(const b of billboards){b.position.z+=speed*dt; if(b.position.z>24)b.position.z-=SPAN;}
 for(const c of traffic){ c.position.z+=(speed-c.userData.speed)*dt;
   if(c.position.z>26){c.position.z-=SPAN; c.position.x=(Math.random()*2-1)*5.5; c.userData.speed=16+Math.random()*12;}
   if(c.position.z<-SPAN+10)c.position.z+=SPAN;
   if(c.position.z>-2&&c.position.z<9&&Math.abs(c.position.x-player.position.x)<2.0){ if(speed>c.userData.speed){speed=c.userData.speed*0.55;shake=0.5;sfx('crash');} } }
 dist+=speed*dt; if(shake>0)shake=Math.max(0,shake-dt*1.6);
 const camx=lerp(camera.position.x, player.position.x*0.7, 0.1);
 camera.position.set(camx+(Math.random()-.5)*shake, 3.4+(Math.random()-.5)*shake, player.position.z+11);
 camera.lookAt(player.position.x*0.6,1.4,player.position.z-22);
 camera.fov=lerp(camera.fov,boosting?82:72,0.1); camera.updateProjectionMatrix();
 renderer.toneMappingExposure=lerp(renderer.toneMappingExposure,boosting?1.3:1.0,0.1);
 bloom.strength=lerp(bloom.strength,boosting?1.5:0.95,0.1);
 if(eg){eg.gain.value=0.05+sp*0.06; eng.frequency.value=50+sp*(boosting?360:240);}
 if(boosting&&Math.random()<0.05)sfx('boost');
}
function drawHUD(){ hud.width=W;hud.height=H; hx.clearRect(0,0,W,H);
 const kmh=Math.round(speed/maxSpeed*330);
 hx.fillStyle='rgba(0,0,0,.42)';hx.fillRect(24,24,250,104);
 hx.fillStyle='#7fffd0';hx.font='bold 54px Trebuchet MS';hx.fillText(kmh,40,86);
 hx.font='18px Trebuchet MS';hx.fillStyle='#bdf';hx.fillText('KM/H',150,72);
 hx.fillStyle='#1a2230';hx.fillRect(40,100,210,16);hx.fillStyle=boosting?'#7fd0ff':'#4a90d0';hx.fillRect(40,100,210*nitro/100,16);
 hx.fillStyle='#9bd';hx.font='13px Trebuchet MS';hx.fillText('NITRO  (SHIFT)',40,98);
 hx.fillStyle='#ffe487';hx.font='bold 24px Trebuchet MS';hx.textAlign='right';hx.fillText(Math.round(dist)+' m',W-30,52);
 hx.fillStyle='#fff';hx.font='18px Trebuchet MS';hx.fillText((timeMs/1000).toFixed(1)+'s',W-30,80);hx.textAlign='left';
}
function fit(){W=window.innerWidth;H=window.innerHeight;renderer.setSize(W,H,false);composer.setSize(W,H);bloom.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();}
window.addEventListener('resize',fit);window.addEventListener('orientationchange',()=>setTimeout(fit,300));
let last=0;
function loop(ts){const dt=Math.min(0.05,((ts-last)||16)/1000);last=ts; update(dt); composer.render(); drawHUD(); requestAnimationFrame(loop);}
fit(); camera.position.set(0,3.4,15); requestAnimationFrame(loop);
// touch controls
;(function(){var au=function(){try{aInit();}catch(e){}};
document.querySelectorAll('.touch button[data-k]').forEach(function(b){var k=b.dataset.k;
var on=function(e){e.preventDefault();au();keys[k]=true;};var off=function(e){e.preventDefault();keys[k]=false;};
b.addEventListener('touchstart',on,{passive:false});b.addEventListener('touchend',off,{passive:false});b.addEventListener('touchcancel',off,{passive:false});
b.addEventListener('mousedown',on);window.addEventListener('mouseup',off);});})();
</script>
</body></html>
